services:
  - type: web
    name: mindwell
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mindwell-db
          property: connectionString

databases:
  - name: mindwell-db
    plan: free
    databaseName: mindwell
